<html><body><h2 id="s">Deploying...</h2><script>
async function d(){
  const s=document.getElementById('s');
  const T='nfp_bjTuepxb4KgSS7bg6QT7XGPdVecfKCA4dfde';
  const S='ab68af56-4ec8-4cbb-a9a9-7e4d1276c414';
  const B='https://raw.githubusercontent.com/osvecov805-bot/stroyuchet-pro/main/';
  try{
    s.textContent='Fetching files...';
    const fs=['index.html','services.json','portfolio.json','robots.txt','sitemap.xml'];
    const data={};
    for(const f of fs){
      const r=await fetch(B+f);
      if(r.ok) data[f]=await r.arrayBuffer();
    }
    s.textContent='Computing hashes...';
    const hashes={};
    for(const[f,buf] of Object.entries(data)){
      const h=await crypto.subtle.digest('SHA-1',buf);
      hashes['/'+f]=Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    s.textContent='Creating deploy...';
    const cr=await fetch('https://api.netlify.com/api/v1/sites/'+S+'/deploys',{
      method:'POST',
      headers:{'Authorization':'Bearer '+T,'Content-Type':'application/json'},
      body:JSON.stringify({files:hashes})
    });
    const cd=await cr.json();
    s.textContent='Deploy '+cd.id+' uploading...';
    const req=cd.required||[];
    for(const[f,buf] of Object.entries(data)){
      const h=hashes['/'+f];
      if(req.includes(h)){
        await fetch('https://api.netlify.com/api/v1/deploys/'+cd.id+'/files/'+f,{
          method:'PUT',
          headers:{'Authorization':'Bearer '+T,'Content-Type':'application/octet-stream'},
          body:buf
        });
      }
    }
    s.textContent='DONE! Deploy: '+cd.id;
    s.style.color='green';
  }catch(e){s.textContent='Error: '+e.message;s.style.color='red';}
}
d();
</script></body></html>
